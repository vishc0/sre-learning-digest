name: SRE Learning Digest

# Runs every weekday morning at 7am UTC (2am EST / midnight PST)
on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # also allows manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests python-dateutil

      - name: Generate and send digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}       # your Gmail address
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}  # Gmail App Password
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }} # where to send the digest
        run: python digest.py
